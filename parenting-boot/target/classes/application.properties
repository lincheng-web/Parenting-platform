# 服务器配置
server.port=8081

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/parenting_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456

# JPA配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT配置
jwt.secret=parenting_admin_jwt_secret_key_2026
jwt.expire=86400

# 管理员初始配置
admin.init.username=admin
admin.init.password=admin123

# Redis配置
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=
spring.redis.database=0

# 第三方API配置
deepseek.api.key=your_deepseek_api_key
baidu.map.ak=your_baidu_map_api_key

# Milvus配置
milvus.host=localhost
milvus.port=19530

# 日志配置
logging.level.com.parenting=info
