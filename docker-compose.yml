version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: parenting-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: parenting_platform
      MYSQL_USER: parenting
      MYSQL_PASSWORD: parenting123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    restart: always

  # Redis缓存
  redis:
    image: redis:7
    container_name: parenting-redis
    ports:
      - "6379:6379"
    restart: always

  # Milvus向量数据库
  milvus-standalone:
    image: milvusdb/milvus:v2.3-latest
    container_name: parenting-milvus
    environment:
      - ETCD_ENDPOINTS=http://etcd:2379
      - MINIO_ADDRESS=http://minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus-data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    restart: always

  # ETCD (Milvus依赖)
  etcd:
    image: bitnami/etcd:3.5.0
    container_name: parenting-etcd
    environment:
      - ETCD_ROOT_PASSWORD=etcd123
    volumes:
      - etcd-data:/bitnami/etcd
    restart: always

  # MinIO (Milvus依赖)
  minio:
    image: minio/minio:latest
    container_name: parenting-minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data
    volumes:
      - minio-data:/data
    restart: always

  # Attu (Milvus可视化管理界面)
  attu:
    image: zilliz/attu:latest
    container_name: parenting-attu
    ports:
      - "8000:3000"
    environment:
      - MILVUS_URL=milvus-standalone:19530
    depends_on:
      - milvus-standalone
    restart: always

  # Spring Boot后端应用
  parenting-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: parenting-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/parenting_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123456
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - MILVUS_HOST=milvus-standalone
      - MILVUS_PORT=19530
      - BAIDU_MAP_AK=${BAIDU_MAP_AUTH_TOKEN:-your_baidu_map_api_key}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-your_deepseek_api_key}
    depends_on:
      - mysql
      - redis
      - milvus-standalone
    restart: always

volumes:
  mysql-data:
  redis-data:
  milvus-data:
  etcd-data:
  minio-data:
